services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: @PACKAGE@:latest
    env_file:
      - .env
    ports:
      - "@PORT@:@PORT@"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:@PORT@/health', timeout=3).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
