  short_description: "Scaffold or modernize platform-aware firmware"
  default_prompt: "Use $embedded-project-setup to inspect the working directory, detect the user's OS/architecture, identify the MCU target, then create or modernize a STM32/Cortex-M embedded C firmware project with CMake, Ninja, clangd, clang-format, clang-tidy, OpenOCD, Cortex-Debug, and CI-ready structure."
