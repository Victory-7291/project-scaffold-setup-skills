name: firmware

on:
  push:
    paths:
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "cmake/**"
      - "include/**"
      - "src/**"
      - "startup/**"
      - "ldscripts/**"
      - "scripts/**"
      - "Dockerfile"
      - ".github/workflows/firmware.yml"
  pull_request:
    paths:
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "cmake/**"
      - "include/**"
      - "src/**"
      - "startup/**"
      - "ldscripts/**"
      - "scripts/**"
      - "Dockerfile"
      - ".github/workflows/firmware.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build toolchain image
        run: docker build -t motor_ctrl-toolchain .
      - name: Check formatting
        run: docker run --rm -v "${{ github.workspace }}:/work" -w /work motor_ctrl-toolchain bash scripts/format.sh --check
      - name: Analyze firmware
        run: docker run --rm -v "${{ github.workspace }}:/work" -w /work motor_ctrl-toolchain bash scripts/analyze.sh
      - name: Build firmware
        run: docker run --rm -v "${{ github.workspace }}:/work" -w /work motor_ctrl-toolchain bash scripts/build.sh
      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: motor_ctrl-firmware
          path: |
            build/stm32-debug/motor_ctrl.elf
            build/stm32-debug/motor_ctrl.bin
            build/stm32-debug/motor_ctrl.hex
            build/stm32-debug/motor_ctrl.map
