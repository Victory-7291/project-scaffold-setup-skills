# Default OpenOCD configuration for the STM32G030 smart-sensor node.
# Uses the ST-Link adapter commonly found on Nucleo/Discovery boards.
# Change the interface file if you are using a different debug probe.

source [find interface/stlink.cfg]
transport select hla_swd

source [find target/stm32g0x.cfg]

reset_config srst_only
adapter speed 4000
